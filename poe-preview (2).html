<!DOCTYPE html><html lang="de"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid Training</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
.anim svg { width:100%; height:180px; }
.phase { opacity:0; transition:opacity 0.4s ease; }
.phase.active { opacity:1; }
.card { background:#374151; padding:12px; border-radius:8px; margin-top:10px; }
</style>
</head>
<body class="bg-gray-900 text-white">

<div class="max-w-md mx-auto p-4 space-y-4">

<h1 class="text-xl font-bold text-green-400">Hybrid Training</h1>

<div class="bg-gray-800 p-3 rounded space-y-3">

<select id="week" class="w-full bg-gray-700 p-2 rounded">
<option value="1">Woche 1 – Basis</option>
<option value="2">Woche 2 – Volumen</option>
<option value="3">Woche 3 – Intensiv</option>
<option value="4">Woche 4 – Deload</option>
</select>

<select id="sessions" class="w-full bg-gray-700 p-2 rounded">
<option value="2">2 Einheiten</option>
<option value="3">3 Einheiten</option>
</select>

<div id="locationSelectors"></div>

<button onclick="generatePlan()" class="w-full bg-green-500 text-black p-2 rounded">
Plan generieren
</button>

<button onclick="exportCalendar()" class="w-full bg-blue-500 p-2 rounded">
In Kalender exportieren
</button>

</div>

<div id="output" class="space-y-4"></div>

</div>

<script>

// =====================
// ÜBUNGSDATENBANK
// =====================

const DB = {
squat:["LH Kniebeuge","Front Squat","Goblet Squat"],
hinge:["RDL","Hip Thrust","KB RDL"],
push:["Bankdrücken","Liegestütze","Schulterdrücken"],
pull:["LH Rudern","Klimmzüge","KH Rudern"],
core:["Plank","Dead Bug","Side Plank"]
};

// =====================
// LOCATION SELECTORS
// =====================

document.getElementById("sessions").addEventListener("change",updateLocations);
updateLocations();

function updateLocations(){
let count=parseInt(document.getElementById("sessions").value);
let container=document.getElementById("locationSelectors");
container.innerHTML="";
for(let i=0;i<count;i++){
container.innerHTML+=`
<select id="loc${i}" class="w-full bg-gray-700 p-2 rounded">
<option>Gym</option>
<option>Home</option>
</select>`;
}
}

// =====================
// PHASE LOGIK
// =====================

function getPhase(w){
if(w==1) return "3x8 moderat";
if(w==2) return "4x8-10 Volumen";
if(w==3) return "EMOM / Supersätze";
return "2x8 Deload reduziert";
}

// =====================
// WARMUP ENGINE
// =====================

function warmup(type){
if(type==="Lower"){
return `
Mobilisation Hüfte<br>
Glute Activation<br>
10 Bodyweight Squats<br>
2 Aufwärmsätze Hauptübung
`;
}
if(type==="Upper"){
return `
Armkreisen & Schulterblattkontrolle<br>
Scapula Pushups<br>
1 Push Warmup<br>
1 Pull Warmup
`;
}
return `Leichtes Cardio 3 Min<br>Ganzkörper Mobilisation`;
}

// =====================
// SVG ANIMATION
// =====================

function animationBlock(){
return `
<div class="anim">
<svg viewBox="0 0 200 200">
<rect class="phase active" x="80" y="20" width="40" height="40" fill="lime"/>
<rect class="phase" x="80" y="80" width="40" height="40" fill="lime"/>
<rect class="phase" x="80" y="20" width="40" height="40" fill="lime"/>
</svg>
</div>`;
}

let timers=[];

function clearTimers(){
timers.forEach(t=>clearInterval(t));
timers=[];
}

function startAnimations(){
document.querySelectorAll(".anim").forEach(block=>{
let phases=block.querySelectorAll(".phase");
let i=0;
let timer=setInterval(()=>{
phases[i].classList.remove("active");
i=(i+1)%phases.length;
phases[i].classList.add("active");
},1000);
timers.push(timer);
});
}

// =====================
// TRAININGSPLAN
// =====================

function exerciseCard(type){

let options=DB[type];

return `
<div class="card">
<select class="w-full bg-gray-800 p-2 rounded mb-2">
${options.map(o=>`<option>${o}</option>`).join("")}
</select>
${animationBlock()}
</div>
`;
}

function generatePlan(){

clearTimers();

let week=parseInt(document.getElementById("week").value);
let sessions=parseInt(document.getElementById("sessions").value);
let output=document.getElementById("output");
output.innerHTML="";

output.innerHTML+=`
<div class="bg-gray-800 p-3 rounded">
<div class="text-green-400 font-semibold">Woche ${week}</div>
<div class="text-gray-400 text-sm mb-2">Phase: ${getPhase(week)}</div>
`;

for(let i=0;i<sessions;i++){

let location=document.getElementById("loc"+i).value;
let focus=i===0?"Lower":"Upper";

output.innerHTML+=`
<div class="mt-3">
<div class="font-semibold">Einheit ${i+1} – ${focus} – ${location}</div>
<div class="text-xs text-gray-400 mb-2">
Warm-up:<br>${warmup(focus)}
</div>
`;

if(focus==="Lower"){
output.innerHTML+=exerciseCard("squat");
output.innerHTML+=exerciseCard("hinge");
} else {
output.innerHTML+=exerciseCard("push");
output.innerHTML+=exerciseCard("pull");
}

output.innerHTML+=exerciseCard("core");
output.innerHTML+=`</div>`;
}

output.innerHTML+=`</div>`;

startAnimations();
}

// =====================
// KALENDER EXPORT
// =====================

function exportCalendar(){

let week=parseInt(document.getElementById("week").value);

let ics="BEGIN:VCALENDAR\nVERSION:2.0\n";
let date=new Date();
let formatted=date.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";

ics+=`BEGIN:VEVENT
UID:${week}@training
DTSTAMP:${formatted}
DTSTART:${formatted}
DTEND:${formatted}
SUMMARY:Hybrid Training Woche ${week}
DESCRIPTION:Trainingsphase ${getPhase(week)}
END:VEVENT\n`;

ics+="END:VCALENDAR";

let blob=new Blob([ics],{type:"text/calendar"});
let link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="training_woche_"+week+".ics";
link.click();
}

</script>



</body></html>
