<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid Engine</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

<div class="max-w-2xl mx-auto p-4 space-y-6">

<h1 class="text-2xl font-bold text-green-400">Hybrid Training Engine</h1>

<div class="bg-gray-800 p-4 rounded space-y-3">

<select id="week" class="w-full bg-gray-700 p-2 rounded">
<option value="1">Woche 1</option>
<option value="2">Woche 2</option>
<option value="3">Woche 3</option>
<option value="4">Woche 4</option>
</select>

<select id="equipment" class="w-full bg-gray-700 p-2 rounded">
<option value="gym">Gym</option>
<option value="bodyweight">Home (Bodyweight)</option>
</select>

<button id="generateBtn" class="w-full bg-green-500 text-black p-2 rounded">
Trainingsplan generieren
</button>

</div>

<div>
<h2 class="text-xl font-semibold">Übungsdatenbank</h2>
<div id="database"></div>
</div>

<div>
<h2 class="text-xl font-semibold">Trainingsplan</h2>
<div id="output"></div>
</div>

</div>

<script>

// ===== DATEN =====

const PATTERNS = {
knee: "Knee Dominant",
hip: "Hip Dominant",
push: "Push",
pull: "Pull",
core: "Core"
};

const EXERCISES = [
{ name:"LH Kniebeuge", pattern:"knee", equipment:"gym" },
{ name:"Front Squat", pattern:"knee", equipment:"gym" },
{ name:"Ausfallschritte", pattern:"knee", equipment:"bodyweight" },

{ name:"RDL", pattern:"hip", equipment:"gym" },
{ name:"Hip Thrust", pattern:"hip", equipment:"gym" },
{ name:"Hip Bridge", pattern:"hip", equipment:"bodyweight" },

{ name:"Bankdrücken", pattern:"push", equipment:"gym" },
{ name:"Liegestütze", pattern:"push", equipment:"bodyweight" },

{ name:"LH Rudern", pattern:"pull", equipment:"gym" },
{ name:"Superman Hold", pattern:"pull", equipment:"bodyweight" },

{ name:"Plank", pattern:"core", equipment:"bodyweight" },
{ name:"Hanging Leg Raise", pattern:"core", equipment:"gym" }
];

let favorites = JSON.parse(localStorage.getItem("favorites")) || [];

// ===== FAVORITEN =====

function toggleFavorite(name){
if(favorites.includes(name)){
favorites = favorites.filter(f=>f!==name);
} else {
favorites.push(name);
}
localStorage.setItem("favorites", JSON.stringify(favorites));
renderDatabase();
}

// ===== DATENBANK =====

function renderDatabase(){

let equipment = document.getElementById("equipment").value;
let container = document.getElementById("database");
container.innerHTML="";

Object.keys(PATTERNS).forEach(pattern=>{

let exercises = EXERCISES.filter(ex =>
ex.pattern===pattern &&
ex.equipment===equipment
);

if(exercises.length===0) return;

let section = document.createElement("div");

section.innerHTML = `
<h3 class="mt-4 mb-2 font-bold text-green-400">
${PATTERNS[pattern]}
</h3>
<div class="grid grid-cols-2 gap-2"></div>
`;

let grid = section.querySelector("div");

exercises.forEach(ex=>{
let card = document.createElement("div");
card.className="bg-gray-800 p-3 rounded flex justify-between items-center";

card.innerHTML = `
<span class="text-sm">${ex.name}</span>
<button class="${favorites.includes(ex.name) ? 'text-yellow-400' : 'text-gray-500'}">★</button>
`;

card.querySelector("button").addEventListener("click", ()=>{
toggleFavorite(ex.name);
});

grid.appendChild(card);
});

container.appendChild(section);

});

}

document.getElementById("equipment").addEventListener("change", renderDatabase);
renderDatabase();

// ===== PERIODISIERUNG =====

function getLoad(week){
if(week==1) return "3x8 RPE 7";
if(week==2) return "4x8 RPE 8";
if(week==3) return "5x5 RPE 8-9";
return "2x6 RPE 6";
}

// ===== PLAN ENGINE =====

function pickExercise(pattern, equipment){

let pool = EXERCISES.filter(ex =>
ex.pattern===pattern &&
ex.equipment===equipment
);

if(pool.length===0) return null;

let favPool = pool.filter(ex=>favorites.includes(ex.name));

if(favPool.length>0) return favPool[0];

return pool[0];
}

function buildUnit(title, patterns, week, equipment){

let wrapper = document.createElement("div");
wrapper.className="mt-4";

wrapper.innerHTML = `<h3 class="font-bold text-blue-400">${title}</h3>`;

patterns.forEach(p=>{

let ex = pickExercise(p,equipment);

let card = document.createElement("div");
card.className="bg-gray-800 p-3 rounded mt-2";

if(!ex){
card.innerHTML=`Keine Übung für ${PATTERNS[p]} verfügbar`;
} else {
card.innerHTML=`
<div class="font-semibold">${ex.name}</div>
<div class="text-sm text-gray-400">${getLoad(week)}</div>
`;
}

wrapper.appendChild(card);

});

return wrapper;
}

function generatePlan(){

let week = parseInt(document.getElementById("week").value);
let equipment = document.getElementById("equipment").value;
let output = document.getElementById("output");

output.innerHTML="";

output.appendChild(
buildUnit("Einheit A",["knee","push","hip","pull","core"],week,equipment)
);

output.appendChild(
buildUnit("Einheit B",["hip","push","knee","pull","core"],week,equipment)
);

}

document.getElementById("generateBtn").addEventListener("click", generatePlan);

</script>



</body></html>
