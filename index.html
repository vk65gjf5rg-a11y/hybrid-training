<!DOCTYPE html><html lang="de"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid Coach Pro</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
.badge-push { background: rgba(59,130,246,0.15); color: #60a5fa; }
.badge-pull { background: rgba(168,85,247,0.15); color: #c084fc; }
.badge-knee { background: rgba(234,179,8,0.15); color: #facc15; }
.badge-hip  { background: rgba(239,68,68,0.15); color: #f87171; }
.badge-core { background: rgba(20,184,166,0.15); color: #2dd4bf; }
</style>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen">

<header class="border-b border-gray-800 px-6 py-5">
<div class="max-w-6xl mx-auto flex justify-between items-center">
<h1 class="text-2xl font-bold">
HYBRID <span class="text-emerald-400">COACH</span>
</h1>
<div class="flex gap-4 text-sm">
<button onclick="showTab('plan')">🏋️ Plan</button>
<button onclick="showTab('favorites')">⭐ Favoriten</button>
<button onclick="showTab('database')">📚 Datenbank</button>
</div>
</div>
</header>

<main class="max-w-6xl mx-auto p-6">

<div id="tab-plan"></div>

<div id="tab-favorites" class="hidden">
<h2 class="text-xl font-bold mb-6">⭐ Favoriten</h2>
<div id="favorites-list" class="grid md:grid-cols-2 gap-6"></div>
</div>

<div id="tab-database" class="hidden">
<h2 class="text-xl font-bold mb-6">📚 Übungsdatenbank</h2>
<input placeholder="Übung suchen..." class="w-full bg-gray-900 border border-gray-700 p-3 rounded mb-6" oninput="renderDatabase(this.value)">
<div id="database-list" class="grid md:grid-cols-2 gap-6"></div>
</div>

</main>

<script>

/* ================= STATE ================= */

let EQUIPMENT = "gym";
let FOCUS = "muskelaufbau";
let FAVORITES = [];

/* ================= SCHEMES ================= */

const SCHEMES = {
muskelaufbau: "3–4 × 8–12",
kraft: "5 × 5",
athletik: "4 × 6 explosiv"
};

/* ================= WARMUPS ================= */

const WARMUPS = {
standard:[
"3–5 Min Cardio",
"10 Kniebeugen",
"10 Armkreisen",
"20 Sek Plank",
"World's Greatest Stretch"
],
mobility:[
"World's Greatest Stretch",
"Cat-Cow 10x",
"Hüftkreisen",
"Schulterkreisen"
],
athletik:[
"Jumping Jacks 30 Sek",
"High Knees 30 Sek",
"3 Broad Jumps",
"Mountain Climbers"
]
};

/* ================= MUSCLE MAP ================= */

function getMuscles(focus){
if(focus==="push") return {primary:"Brust, Schulter, Trizeps",secondary:"Core"};
if(focus==="pull") return {primary:"Latissimus, oberer Rücken, Bizeps",secondary:"hintere Schulter"};
if(focus==="knee") return {primary:"Quadrizeps, Gesäß",secondary:"Adduktoren, Core"};
if(focus==="hip") return {primary:"Gesäß, Beinbeuger",secondary:"unterer Rücken"};
if(focus==="core") return {primary:"Bauchmuskulatur",secondary:"tiefe Rumpfmuskulatur"};
return {primary:"-",secondary:"-"};
}

/* ================= BASIS ÜBUNGEN ================= */

const BASE_EXERCISES = [
{
de:"Kniebeuge", en:"Squat",
equipment:"gym", tool:"Langhantel",
focus:"knee",
desc:"Füße schulterbreit, 360° Atemspannung. Hüfte kontrolliert nach hinten unten führen.",
mistakes:"Knie kollabieren • Rundrücken • Gewicht auf Zehen"
},
{
de:"Kreuzheben", en:"Deadlift",
equipment:"gym", tool:"Langhantel",
focus:"hip",
desc:"Lat aktivieren, Spannung vor Abheben aufbauen.",
mistakes:"Rundrücken • Hüfte schießt hoch • Lean Back"
},
{
de:"Bankdrücken", en:"Bench Press",
equipment:"gym", tool:"Langhantel + Bank",
focus:"push",
desc:"Schulterblätter fixieren, kontrolliert zur Brust senken.",
mistakes:"Ellbogen flare • Schulter verliert Spannung"
},
{
de:"Klimmzüge", en:"Pull-Ups",
equipment:"gym", tool:"Klimmzugstange",
focus:"pull",
desc:"Schulterblätter zuerst aktivieren, Brust zur Stange führen.",
mistakes:"Schwung • passive Schulter"
},
{
de:"Hip Thrust", en:"Hip Thrust",
equipment:"gym", tool:"Langhantel + Bank",
focus:"hip",
desc:"Hüfte explosiv strecken, Gesäß oben anspannen.",
mistakes:"Überstrecken • fehlende Endstreckung"
},
{
de:"Pallof Press", en:"Pallof Press",
equipment:"gym", tool:"Kabelzug",
focus:"core",
desc:"Seitlich zum Kabel stehen, Rotation verhindern.",
mistakes:"Oberkörper rotiert • fehlende Spannung"
},
{
de:"Plank", en:"Plank",
equipment:"bodyweight", tool:"Eigengewicht",
focus:"core",
desc:"Gerade Linie halten, Bauchspannung aktivieren.",
mistakes:"Hüfte hängt durch • Schultern hochziehen"
}
];

const VARIATIONS = [
"klassisch","langsam exzentrisch","mit Pause unten",
"explosiv","Tempo 3-1-1","kontrolliert"
];

/* ================= DB GENERIEREN ================= */

let DB = [];

BASE_EXERCISES.forEach(base=>{
VARIATIONS.forEach(v=>{
let m = getMuscles(base.focus);
DB.push({
name_de: base.de + " – " + v,
name_en: base.en + " – " + v,
equipment: base.equipment,
tool: base.tool,
focus: base.focus,
primary: m.primary,
secondary: m.secondary,
description: base.desc,
mistakes: base.mistakes
});
});
});

/* ================= TABS ================= */

function showTab(tab){
["plan","favorites","database"].forEach(t=>{
document.getElementById("tab-"+t).classList.add("hidden");
});
document.getElementById("tab-"+tab).classList.remove("hidden");
if(tab==="plan") renderPlan();
if(tab==="favorites") renderFavorites();
if(tab==="database") renderDatabase();
}

/* ================= PLAN ================= */

function renderPlan(){
document.getElementById("tab-plan").innerHTML=`

<div class="flex flex-wrap gap-4 mb-8">

<select onchange="EQUIPMENT=this.value; generatePlan()" class="bg-gray-900 border border-gray-700 p-2 rounded">
<option value="gym">Gym</option>
<option value="bodyweight">Bodyweight</option>
</select>

<select onchange="FOCUS=this.value; generatePlan()" class="bg-gray-900 border border-gray-700 p-2 rounded">
<option value="muskelaufbau">Muskelaufbau</option>
<option value="kraft">Kraft</option>
<option value="athletik">Athletik</option>
</select>

<select id="durationSelect" class="bg-gray-900 border border-gray-700 p-2 rounded">
<option value="30">30 Minuten</option>
<option value="45">45 Minuten</option>
<option value="60">60 Minuten</option>
</select>

<select id="warmupSelect" class="bg-gray-900 border border-gray-700 p-2 rounded">
<option value="standard">Warm-up Standard</option>
<option value="mobility">Warm-up Mobility</option>
<option value="athletik">Warm-up Athletik</option>
</select>

<button onclick="generatePlan()" class="bg-emerald-600 px-4 py-2 rounded">
Training generieren
</button>

</div>

<div id="warmupBox" class="mb-10"></div>
<div id="workoutGrid" class="grid md:grid-cols-2 gap-8"></div>
`;

generatePlan();
}

function generatePlan(){

let duration=parseInt(document.getElementById("durationSelect").value);
let warmupType=document.getElementById("warmupSelect").value;

let available=DB.filter(e=>e.equipment===EQUIPMENT);
let count=duration===60?6:duration===45?5:4;
count=Math.min(count,available.length);

let selected=[...available].sort(()=>0.5-Math.random()).slice(0,count);

/* Warmup */
document.getElementById("warmupBox").innerHTML=`
<div class="bg-gray-900 border border-emerald-500/40 rounded-2xl p-6">
<div class="text-emerald-400 font-semibold mb-3">🔥 Warm-up</div>
<ul class="list-disc list-inside text-sm text-gray-300">
${WARMUPS[warmupType].map(w=>`<li>${w}</li>`).join("")}
</ul>
</div>
`;

/* Cards */
document.getElementById("workoutGrid").innerHTML=
selected.map(ex=>`
<div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg">

<div class="flex justify-between mb-2">
<div>
<div class="text-lg font-semibold">${ex.name_de}</div>
<div class="text-sm text-gray-400">${ex.name_en}</div>
${ex.equipment==="gym" ? `<div class="text-xs text-gray-500">Hilfsmittel: ${ex.tool}</div>` : ""}
</div>
<button onclick="toggleFavorite('${ex.name_de}')">
${FAVORITES.includes(ex.name_de) ? "⭐" : "☆"}
</button>
</div>

<span class="px-3 py-1 rounded-full text-xs font-semibold badge-${ex.focus}">
${ex.focus.toUpperCase()}
</span>

<div class="text-emerald-400 mt-2 mb-3">${SCHEMES[FOCUS]}</div>

<div class="text-sm mb-2"><strong>Beschreibung:</strong> ${ex.description}</div>
<div class="text-sm text-gray-400"><strong>Primär:</strong> ${ex.primary}</div>
<div class="text-sm text-gray-500 mb-2"><strong>Sekundär:</strong> ${ex.secondary}</div>
<div class="text-sm text-red-400"><strong>Fehler:</strong> ${ex.mistakes}</div>

</div>
`).join("");
}

/* ================= FAVORITES ================= */

function toggleFavorite(name){
if(FAVORITES.includes(name)){
FAVORITES = FAVORITES.filter(f=>f!==name);
}else{
FAVORITES.push(name);
}
generatePlan();
}

function renderFavorites(){
let favs=DB.filter(ex=>FAVORITES.includes(ex.name_de));
document.getElementById("favorites-list").innerHTML=
favs.length>0 ?
favs.map(ex=>`
<div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
<div class="text-lg font-semibold">${ex.name_de}</div>
<div class="text-sm text-gray-400">${ex.name_en}</div>
</div>
`).join("")
:
"<div>Keine Favoriten gespeichert.</div>";
}

/* ================= DATABASE ================= */

function renderDatabase(filterText=""){
let query=filterText.toLowerCase();

let filtered=DB.filter(ex =>
(ex.name_de && ex.name_de.toLowerCase().includes(query)) ||
(ex.name_en && ex.name_en.toLowerCase().includes(query)) ||
(ex.description && ex.description.toLowerCase().includes(query)) ||
(ex.primary && ex.primary.toLowerCase().includes(query)) ||
(ex.secondary && ex.secondary.toLowerCase().includes(query)) ||
(ex.mistakes && ex.mistakes.toLowerCase().includes(query)) ||
(ex.tool && ex.tool.toLowerCase().includes(query))
);

document.getElementById("database-list").innerHTML=
filtered.length>0 ?
filtered.map(ex=>`
<div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
<div class="text-lg font-semibold">${ex.name_de}</div>
<span class="px-3 py-1 rounded-full text-xs font-semibold badge-${ex.focus}">
${ex.focus.toUpperCase()}
</span>
<div class="text-sm text-gray-400 mb-1">${ex.name_en}</div>
${ex.equipment==="gym" ? `<div class="text-xs text-gray-500 mb-2">Hilfsmittel: ${ex.tool}</div>` : ""}
<div class="text-sm mb-2">${ex.description}</div>
<div class="text-sm text-gray-400"><strong>Primär:</strong> ${ex.primary}</div>
<div class="text-sm text-gray-500 mb-2"><strong>Sekundär:</strong> ${ex.secondary}</div>
<div class="text-sm text-red-400">${ex.mistakes}</div>
</div>
`).join("")
:
"<div>Keine Übungen gefunden.</div>";
}

/* ================= INIT ================= */

renderPlan();

</script>


</body></html>
