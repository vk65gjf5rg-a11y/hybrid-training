<!DOCTYPE html><html lang="de"><head><meta name="x-poe-datastore-behavior" content="local_only"><meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://code.jquery.com https://unpkg.com https://d3js.org https://threejs.org https://cdn.plot.ly https://stackpath.bootstrapcdn.com https://maps.googleapis.com https://cdn.tailwindcss.com https://ajax.googleapis.com https://kit.fontawesome.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://code.highcharts.com https://tako-static-assets-production.s3.amazonaws.com https://www.youtube.com https://fonts.googleapis.com https://fonts.gstatic.com https://pfst.cf2.poecdn.net https://puc.poecdn.net https://i.imgur.com https://wikimedia.org https://*.icons8.com https://*.giphy.com https://picsum.photos https://images.unsplash.com; frame-src 'self' https://www.youtube.com https://trytako.com; child-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests; block-all-mixed-content;">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hybrid Coach System</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { font-family: system-ui; }
.focus-knee { background:#f59e0b20; color:#fbbf24; }
.focus-push { background:#3b82f620; color:#60a5fa; }
.focus-hip { background:#ef444420; color:#f87171; }
.focus-pull { background:#8b5cf620; color:#c084fc; }
.focus-core { background:#06b6d420; color:#22d3ee; }
</style>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen">

<header class="border-b border-gray-800 px-6 py-5">
<div class="max-w-6xl mx-auto flex justify-between items-center">
<h1 class="text-2xl font-bold">
HYBRID <span class="text-emerald-400">COACH</span>
</h1>
<div class="flex gap-4 text-sm">
<button onclick="showTab('plan')">🏋️ Plan</button>
<button onclick="showTab('favorites')">⭐ Favoriten</button>
<button onclick="showTab('database')">📚 Datenbank</button>
</div>
</div>
</header>

<main class="max-w-6xl mx-auto p-6">

<div id="tab-plan"></div>

<div id="tab-favorites" class="hidden">
<h2 class="text-xl font-bold mb-6">⭐ Deine Favoriten</h2>
<div id="favorites-list" class="grid md:grid-cols-2 gap-6"></div>
</div>

<div id="tab-database" class="hidden">
<h2 class="text-xl font-bold mb-6">📚 Übungsdatenbank</h2>
<input type="text" id="search" placeholder="Übung suchen..." class="w-full bg-gray-900 border border-gray-700 p-3 rounded mb-6">
<div id="database-list" class="grid md:grid-cols-2 gap-6"></div>
</div>

</main>

<script>

/* ================= STATE ================= */

let FAVORITES=[];
let CURRENT_WEEK=1;

/* ================= SATZSCHEMA ================= */

const SCHEMES={
1:"3×10",
2:"4×8",
3:"5×5",
4:"2×6 (Deload)"
};

/* ================= WARMUPS ================= */

const WARMUPS={
standard:{
label:"Standard Warm‑up",
steps:[
"3–5 Minuten lockeres Cardio",
"Hüft- & Schulter-Mobilisation",
"10 Körpergewichts-Kniebeugen",
"10 leichte Push-Ups"
]},
athletic:{
label:"Athletic Warm‑up",
steps:[
"30 Sek Jumping Jacks",
"30 Sek High Knees",
"5 Broad Jumps",
"5 explosive Liegestütze"
]}
};

/* ================= ÜBUNGSDATENBANK ================= */

const DB={

knee:{
label:"Kniebeugung",
gym:[
{
de:"Kniebeuge (Langhantel)",
en:"Back Squat",
goal:"Primär: Quadrizeps & Gesäß • Sekundär: Core & Rückenstrecker",
execution:[
"Stand schulterbreit, Füße leicht nach außen",
"Bauchspannung aufbauen, Brust anheben",
"Hüfte und Knie gleichzeitig beugen",
"Bis unter Parallel kontrolliert absenken",
"Über die gesamte Fußsohle kraftvoll hochdrücken"
],
breathing:"Vor dem Absenken einatmen, Spannung halten, beim Hochdrücken ausatmen.",
cues:"Drück den Boden weg • Knie aktiv nach außen • Brust stolz",
mistake:"Rundrücken oder Knie kollabieren nach innen.",
progression:"Gewicht steigern oder Tempo-Wiederholungen (3 Sek exzentrisch).",
regression:"Goblet Squat oder Box Squat."
}
],
bodyweight:[
{
de:"Kniebeuge",
en:"Bodyweight Squat",
goal:"Grundkraft & Bewegungsmuster entwickeln",
execution:[
"Füße schulterbreit",
"Hüfte nach hinten schieben",
"Tief beugen",
"Kontrolliert aufrichten"
],
breathing:"Ein beim Absenken, aus beim Hochdrücken.",
cues:"Gewicht über Mittelfuß • Spannung halten",
mistake:"Fersen heben oder Knie kippen.",
progression:"Sprungkniebeugen oder langsame Exzentrik.",
regression:"Teilbewegung oder Box Squat."
}
]
},

push:{
label:"Drücken",
gym:[
{
de:"Bankdrücken",
en:"Bench Press",
goal:"Primär: Brust • Sekundär: Trizeps & Schulter",
execution:[
"Schulterblätter zusammenziehen",
"Stange kontrolliert zur unteren Brust",
"Kurz Spannung halten",
"Explosiv hochdrücken"
],
breathing:"Einatmen beim Absenken, Pressatmung beim Hochdrücken.",
cues:"Zieh die Stange auseinander • Füße fest in den Boden",
mistake:"Schultern wandern nach vorne.",
progression:"Gewicht steigern oder Pausenwiederholungen.",
regression:"Kurzhantel-Press oder Liegestütze."
}
],
bodyweight:[
{
de:"Liegestütze",
en:"Push-Ups",
goal:"Brust, Trizeps & Rumpf",
execution:[
"Körper in einer Linie",
"Ellbogen ca. 45°",
"Kontrolliert absenken",
"Kraftvoll hochdrücken"
],
breathing:"Ein beim Absenken, aus beim Hochdrücken.",
cues:"Spannung im Core • Boden wegdrücken",
mistake:"Hüfte hängt durch.",
progression:"Decline Push-Ups.",
regression:"Knie-Liegestütze."
}
]
}

};

/* ================= TABS ================= */

function showTab(tab){
document.getElementById("tab-plan").classList.add("hidden");
document.getElementById("tab-favorites").classList.add("hidden");
document.getElementById("tab-database").classList.add("hidden");

document.getElementById("tab-"+tab).classList.remove("hidden");

if(tab==="favorites") renderFavorites();
if(tab==="database") renderDatabase();
}

/* ================= PLAN ================= */

function generate(){
CURRENT_WEEK=1;

document.getElementById("tab-plan").innerHTML=`
${renderUnit("Einheit A")}
${renderUnit("Einheit B")}
`;
}

function renderUnit(title){
return `
<div class="mb-16">

<h2 class="text-xl font-bold mb-4">${title}</h2>

<select onchange="changeWarmup(this)"
class="bg-gray-800 border border-gray-700 p-2 rounded mb-4">
<option value="standard">Standard Warm‑up</option>
<option value="athletic">Athletic Warm‑up</option>
</select>

<div class="warmup mb-8">
${renderWarmup("standard")}
</div>

<div class="grid md:grid-cols-2 gap-8">
${renderPattern("knee","gym")}
${renderPattern("push","gym")}
</div>

</div>
`;
}

function renderWarmup(type){
let w=WARMUPS[type];
return `
<div class="bg-gray-900 border border-emerald-500/30 rounded-xl p-5">
<div class="text-emerald-400 font-semibold mb-2">${w.label}</div>
<ul class="list-disc list-inside text-sm text-gray-300">
${w.steps.map(s=>`<li>${s}</li>`).join("")}
</ul>
</div>
`;
}

function changeWarmup(select){
select.parentElement.querySelector(".warmup").innerHTML=
renderWarmup(select.value);
}

/* ================= ÜBUNGSKARTE ================= */

function renderPattern(pattern,equipment){

let ex=DB[pattern][equipment][0];

return `
<div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">

<div class="flex justify-between items-center mb-4">
<span class="text-xs px-3 py-1 rounded-full focus-${pattern}">
${DB[pattern].label}
</span>

<button onclick="toggleFavorite('${ex.de}')">
${FAVORITES.includes(ex.de)?"⭐":"☆"}
</button>
</div>

<div class="text-lg font-semibold">${ex.de}</div>
<div class="text-sm text-gray-400 mb-2">${ex.en}</div>
<div class="text-emerald-400 mb-3">${SCHEMES[CURRENT_WEEK]}</div>

<div class="text-sm mb-3"><strong>🎯 Zielmuskulatur:</strong> ${ex.goal}</div>

<div class="mb-3">
<strong>⚙️ Bewegungsablauf:</strong>
<ul class="list-disc list-inside text-sm text-gray-300">
${ex.execution.map(e=>`<li>${e}</li>`).join("")}
</ul>
</div>

<div class="text-sm mb-2"><strong>🫁 Atmung:</strong> ${ex.breathing}</div>
<div class="text-sm mb-2"><strong>🧠 Coaching‑Cues:</strong> ${ex.cues}</div>
<div class="text-sm text-red-400 mb-2"><strong>⚠ Fehler:</strong> ${ex.mistake}</div>
<div class="text-sm text-emerald-400 mb-1"><strong>📈 Progression:</strong> ${ex.progression}</div>
<div class="text-sm text-gray-400"><strong>🔄 Regression:</strong> ${ex.regression}</div>

</div>
`;
}

/* ================= FAVORITEN ================= */

function toggleFavorite(name){
if(FAVORITES.includes(name)){
FAVORITES=FAVORITES.filter(f=>f!==name);
}else{
FAVORITES.push(name);
}
generate();
}

function renderFavorites(){
let container=document.getElementById("favorites-list");
container.innerHTML="";
Object.values(DB).forEach(cat=>{
Object.values(cat).forEach(val=>{
if(Array.isArray(val)){
val.forEach(ex=>{
if(FAVORITES.includes(ex.de)){
container.innerHTML+=`
<div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
<div class="text-lg font-semibold">${ex.de}</div>
<div class="text-sm text-gray-400">${ex.en}</div>
</div>
`;
}
});
}
});
});
}

/* ================= DATENBANK ================= */

function renderDatabase(){
let container=document.getElementById("database-list");
container.innerHTML="";
Object.values(DB).forEach(cat=>{
Object.values(cat).forEach(val=>{
if(Array.isArray(val)){
val.forEach(ex=>{
container.innerHTML+=`
<div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
<div class="text-lg font-semibold">${ex.de}</div>
<div class="text-sm text-gray-400 mb-2">${ex.en}</div>
<div class="text-sm">${ex.goal}</div>
</div>
`;
});
}
});
});
}

document.getElementById("search").addEventListener("input",function(){
let q=this.value.toLowerCase();
document.querySelectorAll("#database-list > div").forEach(card=>{
card.style.display=card.textContent.toLowerCase().includes(q)?"block":"none";
});
});

/* ================= INIT ================= */

generate();

</script>


</body></html>
